version: '3.8'

services:
  # ═══ Knowledge Graph Database ═══
  neo4j:
    image: neo4j:5.26-community
    container_name: apex-neo4j
    ports:
      - "7474:7474"   # Browser UI — http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/apex_intelligence_2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  # ═══ Vector Database for RAG ═══
  qdrant:
    image: qdrant/qdrant:latest
    container_name: apex-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
